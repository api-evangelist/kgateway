        type: JSONSchema
      - url: json-schema/ai-backend.json
        type: JSONSchema
      - url: json-ld/kgateway-context.jsonld
        type: JSONLD
    description: >-
      The kgateway Kubernetes Gateway API provides custom resource definitions
      (CRDs) under the gateway.kgateway.dev/v1alpha1 API group for managing
      traffic policies, backends, direct responses, gateway extensions, gateway
      parameters, HTTP listener policies, and AI backends. kgateway is built on
      Envoy proxy and implements the Kubernetes Gateway API for microservices
      and AI agent traffic management.
