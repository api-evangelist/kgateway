          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: >-
            GatewayExtensionSpec defines the desired state of a GatewayExtension.
          properties:
            type:
              type: string
              description: Type of the gateway extension.
              enum:
                - ExtAuth
                - ExtProc
                - RateLimit
            extAuth:
              type: object
              description: External auth extension configuration.
              properties:
                grpcService:
                  type: object
                  properties:
                    backendRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        port:
                          type: integer
            extProc:
              type: object
              description: External processing extension configuration.
              properties:
                grpcService:
                  type: object
                  properties:
                    backendRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        port:
                          type: integer
            rateLimit:
              type: object
              description: Rate limit extension configuration.
              properties:
                grpcService:
                  type: object
                  properties:
                    backendRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        port:
                          type: integer
        status:
          type: object
          description: Status of the GatewayExtension.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    GatewayExtensionList:
      type: object
      description: List of GatewayExtension resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - GatewayExtensionList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/GatewayExtension'
    GatewayParameters:
      type: object
      description: >-
        GatewayParameters customizes gateway infrastructure deployment settings
        including replicas, container configuration, and proxy provisioning.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - GatewayParameters
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: >-
            GatewayParametersSpec defines the desired state of GatewayParameters.
          properties:
            kube:
              type: object
              description: Kubernetes deployment settings.
              properties:
                deployment:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      description: Number of gateway proxy replicas.
                podTemplate:
                  type: object
                  description: Pod template configuration.
                  properties:
                    extraLabels:
                      type: object
                      additionalProperties:
                        type: string
                    extraAnnotations:
                      type: object
                      additionalProperties:
                        type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                          effect:
                            type: string
                envoyContainer:
                  type: object
                  description: Envoy proxy container configuration.
                  properties:
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                    image:
                      type: object
                      properties:
                        registry:
                          type: string
                        repository:
                          type: string
                        tag:
                          type: string
                service:
                  type: object
                  description: Service configuration.
                  properties:
                    type:
                      type: string
                      enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                    extraAnnotations:
                      type: object
                      additionalProperties:
                        type: string
        status:
          type: object
          description: Status of the GatewayParameters.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    GatewayParametersList:
      type: object
      description: List of GatewayParameters resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - GatewayParametersList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/GatewayParameters'
    HTTPListenerPolicy:
      type: object
      description: >-
        HTTPListenerPolicy applies policies to all HTTP and HTTPS listeners
        on a Gateway.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - HTTPListenerPolicy
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: >-
            HTTPListenerPolicySpec defines the desired state of an
            HTTPListenerPolicy.
          properties:
            targetRefs:
              type: array
              description: >-
                References to the Gateway listeners to which this policy applies.
              items:
                $ref: '#/components/schemas/PolicyTargetRef'
            accessLogging:
              type: object
              description: Access logging configuration.
            buffer:
              type: object
              description: Request buffering configuration.
              properties:
                maxRequestBytes:
                  type: integer
                  description: Maximum request body size in bytes.
            celValidation:
              type: object
              description: CEL-based request validation.
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      expression:
                        type: string
                        description: CEL expression to evaluate.
                      action:
                        type: string
                        enum:
                          - Deny
                          - Allow
            basicAuth:
              type: object
              description: Basic authentication configuration.
              properties:
                credentialsSecretRef:
                  type: object
                  description: >-
                    Reference to a Kubernetes secret containing htpasswd-format
                    credentials.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
          required:
            - targetRefs
        status:
          type: object
          description: Status of the HTTPListenerPolicy.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    HTTPListenerPolicyList:
      type: object
      description: List of HTTPListenerPolicy resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - HTTPListenerPolicyList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/HTTPListenerPolicy'
    AIBackend:
      type: object
      description: >-
        AIBackend configures AI provider backends with support for LLM providers
        such as OpenAI, Azure OpenAI, and Gemini.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - AIBackend
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: AIBackendSpec defines the desired state of an AIBackend.
          properties:
            provider:
              type: object
              description: Configuration for the LLM provider.
              properties:
                type:
                  type: string
                  description: The type of LLM provider.
                  enum:
                    - openai
                    - azure
                    - gemini
                    - mistral
                openai:
                  type: object
                  properties:
                    model:
                      type: string
                      description: Model name to use.
                    authToken:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                azure:
                  type: object
                  properties:
                    endpoint:
                      type: string
                    deploymentName:
                      type: string
                    apiVersion:
                      type: string
                    authToken:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                gemini:
                  type: object
                  properties:
                    model:
                      type: string
                    authToken:
                      type: object
                      properties:
                        secretRef:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
            groups:
              type: array
              description: >-
                List of groups in priority order where each group defines a set
                of LLM providers.
              items:
                type: object
                properties:
                  priority:
                    type: integer
                    description: Priority of this group (lower is higher priority).
                  backends:
                    type: array
                    items:
                      type: object
                      properties:
                        backendRef:
                          type: object
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                        weight:
                          type: integer
                          description: Weight for load balancing within the group.
        status:
          type: object
          description: Status of the AIBackend.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    AIBackendList:
      type: object
      description: List of AIBackend resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - AIBackendList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/AIBackend'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Kubernetes API bearer token authentication. Use a service account
        token or kubeconfig token.
security:
  - BearerAuth: []
