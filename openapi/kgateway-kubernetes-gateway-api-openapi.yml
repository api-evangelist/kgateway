      description: The name of the resource.
      schema:
        type: string
    LabelSelector:
      name: labelSelector
      in: query
      required: false
      description: A selector to restrict the list of returned objects by labels.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources to return.
      schema:
        type: integer
    Continue:
      name: continue
      in: query
      required: false
      description: Continue token for paginated list requests.
      schema:
        type: string
  schemas:
    ObjectMeta:
      type: object
      description: Standard Kubernetes object metadata.
      properties:
        name:
          type: string
          description: Name of the resource.
        namespace:
          type: string
          description: Namespace of the resource.
        labels:
          type: object
          additionalProperties:
            type: string
          description: Map of string keys and values for organizing resources.
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Annotations for storing arbitrary metadata.
        resourceVersion:
          type: string
          description: >-
            An opaque value that represents the internal version of this object.
        creationTimestamp:
          type: string
          format: date-time
          description: Timestamp representing the server time when this object was created.
    PolicyTargetRef:
      type: object
      description: Reference to a target resource for policy attachment.
      properties:
        group:
          type: string
          description: Group is the group of the target resource.
          default: gateway.networking.k8s.io
        kind:
          type: string
          description: Kind is the kind of the target resource.
          enum:
            - Gateway
            - HTTPRoute
        name:
          type: string
          description: Name is the name of the target resource.
        namespace:
          type: string
          description: Namespace is the namespace of the target resource.
        sectionName:
          type: string
          description: >-
            SectionName is the name of a section within the target resource
            to apply the policy to.
      required:
        - kind
        - name
    TrafficPolicy:
      type: object
      description: >-
        TrafficPolicy attaches traffic management policies to routes in an
        HTTPRoute or all routes served by a Gateway.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - TrafficPolicy
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: TrafficPolicySpec defines the desired state of a TrafficPolicy.
          properties:
            targetRefs:
              type: array
              description: >-
                References to the target resources to which this policy applies.
              items:
                $ref: '#/components/schemas/PolicyTargetRef'
            cors:
              type: object
              description: CORS policy configuration.
              properties:
                allowOrigins:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - Exact
                          - Prefix
                          - Regex
                      value:
                        type: string
                allowMethods:
                  type: array
                  items:
                    type: string
                allowHeaders:
                  type: array
                  items:
                    type: string
                exposeHeaders:
                  type: array
                  items:
                    type: string
                maxAge:
                  type: string
                  description: Maximum time a preflight request can be cached.
                allowCredentials:
                  type: boolean
            extAuth:
              type: object
              description: External authentication configuration.
              properties:
                extensionRef:
                  type: object
                  description: Reference to a GatewayExtension for external auth.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                disable:
                  type: boolean
                  description: Disable external auth for this route.
            extProc:
              type: object
              description: External processing configuration.
              properties:
                extensionRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                disable:
                  type: boolean
                  description: Disable external processing for this route.
            rateLimit:
              type: object
              description: Rate limiting configuration.
              properties:
                extensionRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                disable:
                  type: boolean
            timeout:
              type: object
              description: Timeout configuration for requests.
              properties:
                request:
                  type: string
                  description: >-
                    Maximum duration for the entire request. Uses Go duration
                    format (e.g., 30s, 1m).
                idle:
                  type: string
                  description: Maximum duration for idle connections.
            retries:
              type: object
              description: Retry configuration for failed requests.
              properties:
                attempts:
                  type: integer
                  description: Maximum number of retry attempts.
                perTryTimeout:
                  type: string
                  description: Timeout per retry attempt.
                backOff:
                  type: object
                  properties:
                    baseInterval:
                      type: string
                    maxInterval:
                      type: string
                retryOn:
                  type: string
                  description: >-
                    Conditions for retry, comma-separated (e.g.,
                    connect-failure,refused-stream,5xx).
            requestHeaderModifier:
              type: object
              description: Modify request headers.
              properties:
                set:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                add:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                remove:
                  type: array
                  items:
                    type: string
            responseHeaderModifier:
              type: object
              description: Modify response headers.
              properties:
                set:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                add:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                remove:
                  type: array
                  items:
                    type: string
          required:
            - targetRefs
        status:
          type: object
          description: Status of the TrafficPolicy.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                    enum:
                      - 'True'
                      - 'False'
                      - Unknown
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    TrafficPolicyList:
      type: object
      description: List of TrafficPolicy resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - TrafficPolicyList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrafficPolicy'
    Backend:
      type: object
      description: >-
        Backend defines a routable backend such as an AI provider, AWS Lambda
        function, or static server for use by Gateways.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - Backend
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: BackendSpec defines the desired state of a Backend.
          properties:
            type:
              type: string
              description: Type of the backend.
              enum:
                - Static
                - AWS
                - AI
            static:
              type: object
              description: Static backend configuration.
              properties:
                hosts:
                  type: array
                  description: List of static hosts.
                  items:
                    type: object
                    properties:
                      host:
                        type: string
                        description: Hostname or IP address.
                      port:
                        type: integer
                        description: Port number.
                      tls:
                        type: object
                        description: TLS configuration for the host.
                        properties:
                          sni:
                            type: string
            aws:
              type: object
              description: AWS Lambda backend configuration.
              properties:
                region:
                  type: string
                  description: AWS region.
                lambdaFunctionName:
                  type: string
                  description: Name of the AWS Lambda function.
                accountId:
                  type: string
                  description: AWS account ID.
                roleArn:
                  type: string
                  description: ARN of the IAM role to assume.
            ai:
              type: object
              description: AI provider backend configuration.
              properties:
                provider:
                  type: object
                  description: Configuration for the LLM provider.
                  properties:
                    type:
                      type: string
                      enum:
                        - openai
                        - azure
                        - gemini
                        - mistral
                    openai:
                      type: object
                      properties:
                        authToken:
                          type: object
                          properties:
                            secretRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
                    azure:
                      type: object
                      properties:
                        endpoint:
                          type: string
                        deploymentName:
                          type: string
                        apiVersion:
                          type: string
                        authToken:
                          type: object
                          properties:
                            secretRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
                    gemini:
                      type: object
                      properties:
                        authToken:
                          type: object
                          properties:
                            secretRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                namespace:
                                  type: string
        status:
          type: object
          description: Status of the Backend.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    BackendList:
      type: object
      description: List of Backend resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - BackendList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/Backend'
    DirectResponse:
      type: object
      description: >-
        DirectResponse configures a Gateway to directly respond to incoming
        requests with a custom HTTP response code and body.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - DirectResponse
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          description: DirectResponseSpec defines the desired state of a DirectResponse.
          properties:
            statusCode:
              type: integer
              description: HTTP status code to return.
              minimum: 200
              maximum: 599
            body:
              type: string
              description: Response body to return.
          required:
            - statusCode
        status:
          type: object
          description: Status of the DirectResponse.
          properties:
            conditions:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  status:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  lastTransitionTime:
                    type: string
                    format: date-time
    DirectResponseList:
      type: object
      description: List of DirectResponse resources.
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - DirectResponseList
        metadata:
          type: object
          properties:
            continue:
              type: string
            resourceVersion:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DirectResponse'
    GatewayExtension:
      type: object
      description: >-
        GatewayExtension integrates external services with a Gateway such as
        external auth, rate limiting, and external processing.
      properties:
        apiVersion:
          type: string
          enum:
            - gateway.kgateway.dev/v1alpha1
        kind:
          type: string
          enum:
            - GatewayExtension
